<ion-content class="login-container">
  <div class="login-wrapper">
    
    <!-- Logo Section -->
    <div class="logo-section">
      <!-- TODO: Add MemoFlip Logo Here -->
      <!-- <img src="assets/logo.png" alt="MemoFlip Logo" class="logo"> -->
      <h1 class="app-title">MemoFlip</h1>
    </div>

    <!-- Welcome Section -->
    <div class="welcome-section">
      <h2>Welcome Back!</h2>
      <p>Sign in to continue your learning journey</p>
    </div>

    <!-- Login Form -->
    <div class="form-section">
      <div class="input-group">
        <ion-label class="input-label">Email Address</ion-label>
        <ion-input 
          type="email" 
          placeholder="your.email@example.com"
          [(ngModel)]="email"
          class="custom-input">
        </ion-input>
      </div>

      <div class="input-group">
        <ion-label class="input-label">Password</ion-label>
        <div class="password-wrapper">
          <ion-input 
            [type]="showPassword ? 'text' : 'password'" 
            placeholder="**********"
            [(ngModel)]="password"
            class="custom-input">
          </ion-input>
          <ion-icon 
            [name]="showPassword ? 'eye-off' : 'eye'" 
            class="eye-icon"
            (click)="togglePassword()">
          </ion-icon>
        </div>
      </div>

      <div class="forgot-password">
        <ion-text class="forgot-text">Forgot Password?</ion-text>
      </div>

      <ion-button expand="block" class="login-btn" (click)="login()">
        LOG IN
      </ion-button>
    </div>

    <!-- OR Divider -->
    <div class="divider">
      <div class="divider-line"></div>
      <span class="divider-text">OR CONTINUE WITH</span>
      <div class="divider-line"></div>
    </div>

    <!-- Social Login Buttons -->
    <div class="social-section">
      <ion-button expand="block" class="google-btn" (click)="googleLogin()">
        <ion-icon name="logo-google" slot="start"></ion-icon>
        Continue with Google
      </ion-button>
      
      <ion-button expand="block" class="facebook-btn" (click)="facebookLogin()">
        <ion-icon name="logo-facebook" slot="start"></ion-icon>
        Continue with Facebook
      </ion-button>
    </div>

    <!-- Sign Up Link -->
    <div class="signup-link">
      <span>Don't have an account? </span>
      <ion-text class="signup-text" (click)="goToRegister()">Sign Up</ion-text>
    </div>

  </div>
</ion-content>
