<ion-content class="profile-container">
  <!-- Header with Avatar -->
  <div class="profile-header">
    <!-- TODO: Add user avatar image here -->
    <!-- <img src="assets/avatar.png" alt="Avatar" class="avatar"> -->
    <div class="avatar-placeholder">
      <ion-icon name="person-circle"></ion-icon>
    </div>
    <h2>Gladys Jane</h2>
    <p>Member since 2024</p>
  </div>

  <!-- Stats Cards -->
  <div class="stats-grid">
    <div class="stat-card">
      <ion-icon name="checkmark-circle"></ion-icon>
      <div class="stat-value">{{ totalCardsStudied }}</div>
      <div class="stat-label">Cards Studied</div>
    </div>
    
    <div class="stat-card">
      <ion-icon name="flame"></ion-icon>
      <div class="stat-value">{{ streak }}</div>
      <div class="stat-label">Day Streak</div>
    </div>
    
    <div class="stat-card">
      <ion-icon name="time"></ion-icon>
      <div class="stat-value">24h</div>
      <div class="stat-label">This Week</div>
    </div>
  </div>

  <!-- Weekly Activity -->
  <div class="activity-section">
    <h3>Weekly Activity</h3>
    <div class="activity-bar">
      <div class="progress-bar">
        <div class="progress-fill" [style.width.%]="completionRate"></div>
      </div>
      <div class="completion-rate">{{ completionRate }}% Completion Rate</div>
    </div>
  </div>

  <!-- Top Contributors -->
  <div class="contributors-section">
    <h3>Top Contributors</h3>
    <div class="contributors-list">
      <div class="contributor-item" *ngFor="let contributor of topContributors; let i = index">
        <div class="rank">{{ i + 1 }}</div>
        <!-- TODO: Add contributor avatar -->
        <div class="contributor-info">
          <div class="contributor-name">{{ contributor.name }}</div>
          <div class="contributor-points">{{ contributor.points }} points</div>
        </div>
        <ion-icon name="trophy" [class.gold]="i === 0" [class.silver]="i === 1" [class.bronze]="i === 2"></ion-icon>
      </div>
    </div>
  </div>
</ion-content>
